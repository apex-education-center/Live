<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Channels Plus — Mobile</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />

    <style>
        :root{
            --bg-main:#0b0c10;
            --bg-elev:#131416;
            --card:#1f252a;
            --accent:#66fcf1;
            --accent-2:#45a29e;
            --muted:#9aa0a6;
            --text:#e6eef0;
            --radius:12px;
        }

        /* Base reset */
        *{box-sizing:border-box}
        html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg-main);color:var(--text);-webkit-tap-highlight-color:transparent}
        a{color:inherit;text-decoration:none}

        /* Layout - desktop/tablet */
        .app {
            display:flex;
            height:100vh;
            width:100%;
            overflow:hidden;
        }

        .sidebar {
            width:320px;
            background:linear-gradient(180deg,var(--bg-elev),#121216);
            border-right:1px solid rgba(255,255,255,0.03);
            padding:16px;
            display:flex;
            flex-direction:column;
            gap:12px;
        }

        .brand { font-weight:800; font-size:1.15rem; display:flex; align-items:center; gap:10px }
        .brand i{ color:var(--accent) }

        .search-box { display:flex; gap:8px; align-items:center }
        .search-box input {
            width:100%;
            padding:10px 14px;
            border-radius:10px;
            background:var(--card);
            border:1px solid rgba(255,255,255,0.03);
            color:var(--text);
            font-size:0.95rem;
            outline:none;
        }

        .channel-list {
            overflow:auto;
            padding-bottom:16px;
        }

        .channel-item {
            display:flex;
            gap:12px;
            align-items:center;
            padding:10px;
            border-radius:10px;
            cursor:pointer;
            transition:background .15s, transform .06s;
            user-select:none;
        }
        .channel-item:active { transform:scale(.997) }
        .channel-item:hover { background:rgba(255,255,255,0.02) }

        .channel-avatar {
            flex:0 0 48px;
            width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;
            font-weight:700;background:linear-gradient(135deg,var(--accent-2),#2b3441);color:#fff;font-size:1rem;
        }

        .channel-info h4 { margin:0;font-size:1rem; }
        .channel-info p { margin:2px 0 0;color:var(--muted);font-size:0.8rem; }

        /* Main column */
        .main {
            flex:1;
            display:flex;
            flex-direction:column;
            min-width:0;
        }

        .player-wrap {
            background:linear-gradient(180deg,#060608,var(--bg-main));
            display:flex;
            align-items:center;
            justify-content:center;
            padding:18px;
            flex:1;
        }

        video#videoPlayer {
            width:100%;
            height:auto;
            max-height:90vh;
            aspect-ratio:16/9;
            border-radius:16px;
            background:#000;
            box-shadow:0 20px 40px rgba(0,0,0,0.6);
            outline:none;
        }

        .meta {
            background:linear-gradient(180deg,var(--bg-elev),#0f1315);
            padding:12px 16px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            border-top:1px solid rgba(255,255,255,0.03);
        }
        .meta .title { display:flex;flex-direction:column;gap:4px }
        .meta h2 { margin:0;font-size:1.1rem }
        .meta p { margin:0;color:var(--muted);font-size:0.88rem }

        .status { display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(102,252,241,0.06);color:var(--accent);font-weight:600 }
        .status-dot { width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent) }

        /* Floating channels button (mobile) */
        .fab-channels {
            display:none;
            position:fixed;
            right:18px;
            bottom:18px;
            z-index:50;
            width:56px;height:56px;border-radius:50%;
            background:var(--accent);
            color:var(--bg-main);
            display:flex;align-items:center;justify-content:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.5);
            cursor:pointer;
            border: none;
        }

        /* Bottom sheet for channels on mobile */
        .channels-sheet {
            display:none;
        }

        /* Responsive / Mobile first adjustments */
        @media (max-width:900px){
            .app { flex-direction:column; height:100vh }
            .sidebar { display:none } /* hide desktop sidebar */
            .fab-channels { display:flex }

            .main { min-height:100vh; }

            .player-wrap { padding:6px }
            video#videoPlayer { border-radius:8px; height:100%; max-height:none; aspect-ratio:unset }

            /* bottom sheet style */
            .channels-sheet {
                display:block;
                position:fixed;
                left:0;right:0;bottom:0;
                height:60vh;
                max-height:85vh;
                background:linear-gradient(180deg,#0f1112,#0b0c10);
                border-top-left-radius:16px;border-top-right-radius:16px;
                box-shadow:0 -20px 40px rgba(0,0,0,0.6);
                transform:translateY(calc(100% - 70px));
                transition:transform .28s cubic-bezier(.2,.9,.3,1);
                z-index:60;
                display:flex;
                flex-direction:column;
                overflow:hidden;
            }

            .channels-sheet.open {
                transform:translateY(0);
            }

            .sheet-header {
                padding:12px 16px;
                display:flex;align-items:center;justify-content:space-between;
                gap:10px;border-bottom:1px solid rgba(255,255,255,0.02);
            }

            .sheet-handle {
                width:44px;height:6px;background:rgba(255,255,255,0.06);border-radius:999px;margin:0 auto;
            }

            .sheet-body { padding:12px; overflow:auto; }
            .channel-item { padding:12px; border-radius:10px }
            .channel-avatar { width:56px;height:56px;border-radius:12px; }
        }

        /* Active state */
        .channel-item.active {
            background:linear-gradient(90deg, rgba(102,252,241,0.06), rgba(102,252,241,0.02));
            border:1px solid rgba(102,252,241,0.12);
        }

        /* Tiny helpers */
        .badge-external { margin-left:8px;color:var(--accent);font-size:0.8rem }
        .hidden { display:none !important }
    </style>
</head>
<body>
    <div class="app" id="appRoot">
        <!-- Desktop Sidebar (kept for larger screens) -->
        <aside class="sidebar" aria-label="Channels sidebar">
            <div class="brand"><i class="fa-solid fa-tv"></i> Channels Plus</div>
            <div class="search-box">
                <input id="searchChannelsDesktop" type="search" placeholder="Search channels..." aria-label="Search channels" />
            </div>
            <div class="channel-list" id="channelListDesktop" role="list"></div>
        </aside>

        <!-- Main -->
        <main class="main" role="main">
            <div class="player-wrap">
                <video id="videoPlayer" controls playsinline webkit-playsinline aria-label="Live video player"></video>
            </div>
            <div class="meta" aria-live="polite">
                <div class="title">
                    <h2 id="currentChannelTitle">Select a channel</h2>
                    <p id="currentChannelCategory">Ready to play</p>
                </div>
                <div class="status" id="statusBadge"><span class="status-dot" aria-hidden="true"></span> Live</div>
            </div>
        </main>
    </div>

    <!-- Mobile: Floating button to open channels -->
    <button id="openChannelsBtn" class="fab-channels" aria-label="Open channels list" title="Channels">
        <i class="fa-solid fa-list"></i>
    </button>

    <!-- Mobile bottom sheet channels -->
    <section id="channelsSheet" class="channels-sheet" aria-hidden="true" aria-label="Channels list">
        <div class="sheet-header">
            <div style="flex:1">
                <div style="text-align:center"><div class="sheet-handle" aria-hidden="true"></div></div>
                <div style="margin-top:8px;font-weight:800;text-align:center">Channels</div>
            </div>
            <div style="flex:0 0 140px;display:flex;align-items:center;gap:8px">
                <input id="searchChannelsMobile" type="search" placeholder="Search..." aria-label="Search channels" style="width:100%;padding:8px;border-radius:10px;background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--text)" />
            </div>
        </div>
        <div class="sheet-body" id="channelListMobile" role="list"></div>
    </section>

    <script>
        // Globals
        const video = document.getElementById('videoPlayer');
        let hlsInstance = null;
        let allChannels = [];
        let currentIndex = -1;
        const desktopList = document.getElementById('channelListDesktop');
        const mobileList = document.getElementById('channelListMobile');
        const channelsSheet = document.getElementById('channelsSheet');
        const openChannelsBtn = document.getElementById('openChannelsBtn');
        const searchMobile = document.getElementById('searchChannelsMobile');
        const searchDesktop = document.getElementById('searchChannelsDesktop');
        let lastSearch = '';

        // Utility: debounce
        function debounce(fn, wait=250){
            let t;
            return (...args) => { clearTimeout(t); t = setTimeout(()=>fn(...args), wait) }
        }

        // Load channels from API
        async function loadChannels(){
            try {
                const res = await fetch('/api/channels');
                if(!res.ok) throw new Error('channels fetch failed');
                allChannels = await res.json();
                renderAll(allChannels);
            } catch (err) {
                console.error('Failed to load channels', err);
                // fallback: empty array
                allChannels = [];
                renderAll([]);
            }
        }

        // Group & render
        function renderAll(channels){
            renderList(channels, desktopList, false);
            renderList(channels, mobileList, true);
        }

        function renderList(channels, container, mobile){
            container.innerHTML = '';
            // group by category: preserve order
            const groups = channels.reduce((acc, ch) => {
                const k = ch.category || 'Other';
                if(!acc[k]) acc[k] = [];
                acc[k].push(ch);
                return acc;
            }, {});

            Object.keys(groups).forEach(category => {
                const header = document.createElement('div');
                header.style.margin = '12px 0 6px';
                header.style.fontSize = '0.78rem';
                header.style.color = 'var(--muted)';
                header.textContent = category;
                container.appendChild(header);

                groups[category].forEach(chan => {
                    const item = document.createElement('div');
                    item.className = 'channel-item';
                    item.id = `chan-${chan.id}`;
                    item.setAttribute('role','listitem');
                    item.onclick = () => selectById(chan.id);

                    const avatar = document.createElement('div');
                    avatar.className = 'channel-avatar';
                    avatar.innerText = (chan.name || '??').slice(0,2).toUpperCase();

                    const info = document.createElement('div');
                    info.className = 'channel-info';
                    const title = document.createElement('h4');
                    title.innerHTML = escapeHtml(chan.name || 'Unnamed') + (chan.is_external ? '<span class="badge-external" title="External link"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>' : '');
                    const subtitle = document.createElement('p');
                    subtitle.textContent = chan.is_external ? ('External') : (chan.referer ? 'Protected stream' : 'Live stream');

                    info.appendChild(title);
                    info.appendChild(subtitle);

                    item.appendChild(avatar);
                    item.appendChild(info);

                    container.appendChild(item);
                });
            });

            // update selected highlight
            highlightSelected();
        }

        function highlightSelected(){
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            if(currentIndex >= 0 && allChannels[currentIndex]){
                const id = allChannels[currentIndex].id;
                const el = document.getElementById(`chan-${id}`);
                if(el) el.classList.add('active');
            }
        }

        // select channel by channel object
        function selectChannel(channel){
            // find index
            const idx = allChannels.findIndex(c => c.id === channel.id);
            if(idx === -1) return;
            currentIndex = idx;
            highlightSelected();
            closeSheetIfMobile();

            document.getElementById('currentChannelTitle').innerText = channel.name;
            document.getElementById('currentChannelCategory').innerText = channel.category || '';

            if(channel.is_external){
                // open external and stop playback
                window.open(channel.url, '_blank', 'noopener');
                stopPlayback();
                return;
            }

            playStream(channel);
        }

        // select by id
        function selectById(id){
            const ch = allChannels.find(c => c.id === id);
            if(ch) selectChannel(ch);
        }

        function stopPlayback(){
            if(hlsInstance){ try { hlsInstance.destroy(); } catch(e){} hlsInstance = null; }
            video.pause();
            video.removeAttribute('src');
            video.load();
        }

        function playStream(channel){
            if(channel.is_external){
                window.open(channel.url, '_blank', 'noopener');
                return;
            }

            const proxyUrl = `/proxy?url=${encodeURIComponent(channel.url)}${channel.referer ? `&referer=${encodeURIComponent(channel.referer)}` : ''}`;

            if(Hls.isSupported()){
                if(hlsInstance){ try { hlsInstance.destroy(); } catch(e){} hlsInstance = null; }
                hlsInstance = new Hls({ maxBufferLength: 20, liveDurationInfinity: true, enableWorker: true });
                hlsInstance.loadSource(proxyUrl);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {});
                });
                hlsInstance.on(Hls.Events.ERROR, (evt, data) => {
                    console.warn('HLS error', data);
                });
            } else if(video.canPlayType('application/vnd.apple.mpegurl')){
                video.src = proxyUrl;
                video.addEventListener('loadedmetadata', () => video.play().catch(()=>{}), { once:true });
            } else {
                console.warn('No HLS support in this browser');
            }
        }

        // Navigation: next / prev
        function nextChannel(){
            if(allChannels.length === 0) return;
            currentIndex = (currentIndex + 1) % allChannels.length;
            selectChannel(allChannels[currentIndex]);
        }
        function prevChannel(){
            if(allChannels.length === 0) return;
            currentIndex = (currentIndex - 1 + allChannels.length) % allChannels.length;
            selectChannel(allChannels[currentIndex]);
        }

        // Mobile sheet controls
        function openSheet(){
            channelsSheet.classList.add('open');
            channelsSheet.setAttribute('aria-hidden','false');
        }
        function closeSheet(){
            channelsSheet.classList.remove('open');
            channelsSheet.setAttribute('aria-hidden','true');
        }
        function closeSheetIfMobile(){
            if(window.matchMedia('(max-width:900px)').matches){
                closeSheet();
            }
        }

        openChannelsBtn.addEventListener('click', () => {
            if(channelsSheet.classList.contains('open')) closeSheet(); else openSheet();
        });

        // search handlers (shared)
        function doSearch(q){
            q = (q||'').trim().toLowerCase();
            if(q === lastSearch) return;
            lastSearch = q;
            const filtered = allChannels.filter(c => {
                const name = (c.name||'').toLowerCase();
                const cat = (c.category||'').toLowerCase();
                return name.includes(q) || cat.includes(q);
            });
            renderAll(filtered);
        }

        const searchDebounced = debounce(doSearch, 180);
        if(searchMobile) searchMobile.addEventListener('input', (e)=>searchDebounced(e.target.value));
        if(searchDesktop) searchDesktop.addEventListener('input', (e)=>searchDebounced(e.target.value));

        // Touch / swipe navigation on video
        (function addSwipe(){
            let startX = 0, startY = 0, distX = 0, distY = 0, startTime = 0;
            const minDist = 40; // px
            video.addEventListener('touchstart', (e)=>{
                const t = e.touches[0];
                startX = t.clientX; startY = t.clientY; startTime = Date.now();
            }, {passive:true});

            video.addEventListener('touchend', (e)=>{
                const t = e.changedTouches[0];
                distX = t.clientX - startX;
                distY = t.clientY - startY;
                const elapsed = Date.now() - startTime;
                if(Math.abs(distX) > Math.abs(distY) && Math.abs(distX) > minDist && elapsed < 600){
                    if(distX < 0) nextChannel(); else prevChannel();
                }
            }, {passive:true});
        })();

        // Keyboard shortcuts for accessibility (desktop)
        window.addEventListener('keydown', (e)=>{
            if(e.key === 'ArrowRight') nextChannel();
            if(e.key === 'ArrowLeft') prevChannel();
            if(e.key === ' ' && document.activeElement !== searchDesktop && document.activeElement !== searchMobile){ e.preventDefault(); if(video.paused) video.play(); else video.pause(); }
        });

        // Helper: escape HTML to keep titles safe
        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // Auto-select first channel when loaded
        async function init(){
            await loadChannels();
            if(allChannels.length > 0){
                currentIndex = 0;
                selectChannel(allChannels[0]);
            }
        }

        // On DOM ready
        window.addEventListener('DOMContentLoaded', init);

        // Optional: attempt fullscreen on orientation change / user tap for immersive mobile
        video.addEventListener('click', async () => {
            // On small screens, request fullscreen for better UX (user gesture present)
            if(window.matchMedia('(max-width:900px)').matches){
                try {
                    if(!document.fullscreenElement){
                        await video.requestFullscreen?.();
                    }
                } catch (err) {
                    // ignore errors
                }
            }
        });

        // Keep highlight when channel data changes (e.g., search)
        const obs = new MutationObserver(()=> highlightSelected());
        obs.observe(document.body, {childList:true, subtree:true});
    </script>
</body>
</html>
