<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Channels Plus — Custom IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
    <style>
        :root {
            --bg-main: #0f0f12;
            --bg-sidebar: #16161e;
            --bg-card: #22222f;
            --bg-card-hover: #2d2d3f;
            --accent: #4ade80; 
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 340px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid #232330;
            display: flex;
            flex-direction: column;
        }

        .brand {
            padding: 24px;
            font-size: 1.4rem;
            font-weight: 700;
            border-bottom: 1px solid #232330;
        }

        .brand span {
            color: var(--accent);
        }

        .search-box {
            padding: 16px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid #2d2d3f;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
        }

        .category-section {
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .category-header {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 0.05rem;
            margin-bottom: 8px;
            padding-left: 4px;
            display: flex;
            align-items: center;
        }

        .category-header::before {
            content: "•";
            margin-right: 6px;
            font-size: 1.2rem;
        }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .channel-item:hover {
            background: var(--bg-card-hover);
        }

        .channel-item.active {
            background: #1e3a2b;
            border-color: var(--accent);
        }

        .channel-avatar {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            background: #2a2a3a;
            margin-right: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--accent);
            background-size: cover;
            background-position: center;
        }

        .channel-info h4 {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #08080a;
        }

        .player-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        video {
            width: 100%;
            height: 100%;
            max-width: 1100px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .view-meta {
            padding: 24px 40px;
            background: var(--bg-sidebar);
            border-top: 1px solid #232330;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            background: rgba(74, 222, 128, 0.1);
            color: var(--accent);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">Channels<span>Plus</span></div>
        <div class="search-box">
            <input type="text" id="searchChannels" placeholder="Filter channels...">
        </div>
        <div class="channel-list" id="channelListContainer"></div>
    </div>

    <div class="main-content">
        <div class="player-container">
            <video id="videoPlayer" controls autoplay muted></video>
        </div>
        <div class="view-meta">
            <div>
                <h2 id="currentChannelTitle">Select a Channel</h2>
                <p id="currentChannelCategory" style="color: var(--text-muted); font-size: 0.9rem;">Ready</p>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div> Proxy Routing Active
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        let hlsInstance = null;
        let allChannels = [];

        async function loadChannels() {
            try {
                const response = await fetch('/api/channels');
                allChannels = await response.json();
                renderGroupedChannels(allChannels);
                if(allChannels.length > 0) {
                    selectChannel(allChannels[0]);
                }
            } catch (err) {
                console.error("Failed to load channel list", err);
            }
        }

        function renderGroupedChannels(channels) {
            const container = document.getElementById('channelListContainer');
            container.innerHTML = '';

            // Group channels by category string
            const groups = {};
            channels.forEach(chan => {
                if(!groups[chan.category]) groups[chan.category] = [];
                groups[chan.category].push(chan);
            });

            for (const [category, items] of Object.entries(groups)) {
                const sect = document.createElement('div');
                sect.className = 'category-section';
                
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerText = category;
                sect.appendChild(header);

                items.forEach(chan => {
                    const item = document.createElement('div');
                    item.className = 'channel-item';
                    item.id = `chan-${chan.id}`;
                    item.onclick = () => selectChannel(chan);
                    item.innerHTML = `
                        <div class="channel-avatar">${chan.name.substring(0,2)}</div>
                        <div class="channel-info"><h4>${chan.name}</h4></div>
                    `;
                    sect.appendChild(item);
                });
                container.appendChild(sect);
            }
        }

        function selectChannel(channel) {
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            const selectedEl = document.getElementById(`chan-${channel.id}`);
            if(selectedEl) selectedEl.classList.add('active');

            document.getElementById('currentChannelTitle').innerText = channel.name;
            document.getElementById('currentChannelCategory').innerText = `Category: ${channel.category}`;

            let proxyUrl = `/proxy?url=${encodeURIComponent(channel.url)}`;
            if(channel.referer) {
                proxyUrl += `&referer=${encodeURIComponent(channel.referer)}`;
            }

            if (Hls.isSupported()) {
                if (hlsInstance) hlsInstance.destroy();
                hlsInstance = new Hls({ maxBufferLength: 10, liveDurationInfinity: true });
                hlsInstance.loadSource(proxyUrl);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = proxyUrl;
                video.addEventListener('loadedmetadata', () => video.play());
            }
        }

        document.getElementById('searchChannels').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allChannels.filter(chan => 
                chan.name.toLowerCase().includes(query) || chan.category.toLowerCase().includes(query)
            );
            renderGroupedChannels(filtered);
        });

        window.addEventListener('DOMContentLoaded', loadChannels);
    </script>
</body>
</html>
