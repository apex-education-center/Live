<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Channels Plus</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0B0C10;
            --bg-sidebar: #1F2833;
            --bg-card: #2B3441;
            --accent: #66FCF1; 
            --accent-dark: #45A29E;
            --text-main: #C5C6C7;
            --text-muted: #8A8D91;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
            box-shadow: var(--shadow);
        }

        .brand {
            padding: 24px;
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand i {
            color: var(--accent);
        }

        .search-box {
            padding: 16px;
            background: rgba(0,0,0,0.1);
        }

        .search-container {
            position: relative;
        }

        .search-container i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 40px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(102, 252, 241, 0.2);
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        /* Custom Scrollbar */
        .channel-list::-webkit-scrollbar { width: 6px; }
        .channel-list::-webkit-scrollbar-track { background: transparent; }
        .channel-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .channel-list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .category-section {
            margin-bottom: 20px;
        }

        .category-header {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent-dark);
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-left: 8px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: transparent;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .channel-item:hover {
            background: var(--bg-card);
        }

        .channel-item.active {
            background: rgba(102, 252, 241, 0.1);
            border: 1px solid rgba(102, 252, 241, 0.3);
        }

        .channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-dark), #2B3441);
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: #fff;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .channel-item.active .channel-avatar {
            background: var(--accent);
            color: var(--bg-main);
        }

        .channel-info h4 {
            font-size: 0.95rem;
            font-weight: 500;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            position: relative;
        }

        .player-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: radial-gradient(circle at center, #1F2833 0%, #0B0C10 100%);
        }

        video {
            width: 100%;
            max-height: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            outline: none;
        }

        .view-meta {
            padding: 20px 30px;
            background: var(--bg-sidebar);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
        }

        .meta-text h2 {
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 4px;
        }

        .meta-text p {
            color: var(--accent-dark);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background: rgba(102, 252, 241, 0.1);
            color: var(--accent);
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(102, 252, 241, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .external-badge {
            font-size: 0.7rem;
            color: var(--accent);
            margin-left: 6px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
                overflow: hidden; 
            }

            .sidebar {
                width: 100%;
                height: 50vh; 
                border-right: none;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                order: 2;
            }

            .main-content {
                height: 50vh;
                order: 1;
                flex: none;
            }

            .player-container {
                padding: 0;
                background: #000;
                height: calc(100% - 70px); 
            }

            video {
                border-radius: 0;
                height: 100%;
                max-height: none;
                box-shadow: none;
            }

            .view-meta {
                padding: 12px 20px;
                height: 70px;
            }

            .meta-text h2 {
                font-size: 1.1rem;
            }
            
            .brand {
                display: none; 
            }
            
            .search-box {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand"><i class="fa-solid fa-tv"></i> Channels Plus</div>
        <div class="search-box">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchChannels" placeholder="Search channels...">
            </div>
        </div>
        <div class="channel-list" id="channelListContainer"></div>
    </div>

    <div class="main-content">
        <div class="player-container">
            <video id="videoPlayer" controls autoplay playsinline></video>
        </div>
        <div class="view-meta">
            <div class="meta-text">
                <h2 id="currentChannelTitle">Select a Channel</h2>
                <p id="currentChannelCategory">Ready to play</p>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div> Live
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        let hlsInstance = null;
        let allChannels = [];
        let currentChannel = null;

        async function loadChannels() {
            try {
                const response = await fetch('/api/channels');
                allChannels = await response.json();
                renderGroupedChannels(allChannels);
                if(allChannels.length > 0) {
                    selectChannel(allChannels[0]);
                }
            } catch (err) {
                console.error("Failed to load channel list", err);
            }
        }

        function renderGroupedChannels(channels) {
            const container = document.getElementById('channelListContainer');
            container.innerHTML = '';

            const groups = {};
            channels.forEach(chan => {
                if(!groups[chan.category]) groups[chan.category] = [];
                groups[chan.category].push(chan);
            });

            for (const [category, items] of Object.entries(groups)) {
                const sect = document.createElement('div');
                sect.className = 'category-section';
                
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerText = category;
                sect.appendChild(header);

                items.forEach(chan => {
                    const item = document.createElement('div');
                    item.className = 'channel-item';
                    item.id = `chan-${chan.id}`;
                    item.onclick = () => selectChannel(chan);
                    
                    const externalBadge = chan.is_external ? '<span class="external-badge"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>' : '';
                    
                    item.innerHTML = `
                        <div class="channel-avatar">${chan.name.substring(0,2)}</div>
                        <div class="channel-info"><h4>${chan.name}${externalBadge}</h4></div>
                    `;
                    sect.appendChild(item);
                });
                container.appendChild(sect);
            }
        }

        function selectChannel(channel) {
            currentChannel = channel;
            
            // Mark as active in sidebar
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            const selectedEl = document.getElementById(`chan-${channel.id}`);
            if(selectedEl) {
                selectedEl.classList.add('active');
                selectedEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            document.getElementById('currentChannelTitle').innerText = channel.name;
            document.getElementById('currentChannelCategory').innerText = channel.category;

            // 1. Handle External Links - Only open on play, not on select
            if (channel.is_external) {
                // Show placeholder or message
                video.src = '';
                document.getElementById('currentChannelCategory').innerText = 'Click play to open in new window →';
                return;
            }

            // 2. Handle Internal HLS Playback
            playStream(channel);
        }

        function playStream(channel) {
            // If external, open in new window
            if (channel.is_external) {
                window.open(channel.url, '_blank');
                return;
            }

            let proxyUrl = `/proxy?url=${encodeURIComponent(channel.url)}`;
            if(channel.referer) {
                proxyUrl += `&referer=${encodeURIComponent(channel.referer)}`;
            }

            if (Hls.isSupported()) {
                if (hlsInstance) hlsInstance.destroy();
                hlsInstance = new Hls({ 
                    maxBufferLength: 15, 
                    liveDurationInfinity: true,
                    enableWorker: true
                });
                hlsInstance.loadSource(proxyUrl);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => console.log("Auto-play prevented", e));
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = proxyUrl;
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(e => console.log("Auto-play prevented", e));
                });
            }
        }

        // Override video play to handle external links
        video.addEventListener('play', (e) => {
            if (currentChannel && currentChannel.is_external) {
                e.preventDefault();
                playStream(currentChannel);
            }
        });

        document.getElementById('searchChannels').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allChannels.filter(chan => 
                chan.name.toLowerCase().includes(query) || chan.category.toLowerCase().includes(query)
            );
            renderGroupedChannels(filtered);
        });

        window.addEventListener('DOMContentLoaded', loadChannels);
    </script>
</body>
</html>
